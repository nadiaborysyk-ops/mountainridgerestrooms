<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap');

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 2.5rem 1rem;
    font-family: 'DM Sans', sans-serif;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin-bottom: -20px;
  }

  .card {
    width: 525px;
    height: 300px;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }

  .card-front {
    background: #2c4a35;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wm { position: absolute; inset: 0; pointer-events: none; }

  .front-content {
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .front-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
    color: #f0ece4;
    letter-spacing: 0.06em;
    white-space: nowrap;
    line-height: 1.2;
  }

  .front-tagline {
    font-family: sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #C4973A;
    margin-top: 12px;
  }

  .card-back {
    background: #f6f3ed;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 30px 38px 30px 44px;
  }

  .accent-bar {
    position: absolute;
    left: 0; top: 0;
    width: 4px; height: 100%;
    background: #2e4a32;
  }

  .back-content {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    height: 100%;
  }

  .back-left {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .top-left-content {
    position: absolute;
    top: 30px;
    left: 44px;
    right: 80px;
  }

  .services-text {
    font-family: sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8aab8e;
    font-weight: 400;
    line-height: 1.4;
  }

  .person-and-contact {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .person-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: #2e4a32;
    line-height: 1.2;
  }

  .person-title {
    font-family: sans-serif;
    font-size: 9.5px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #b8952a;
    margin-bottom: 8px;
  }

  .contact-block {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: #3a5a3e;
    line-height: 1;
  }

  .contact-icon {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    color: #6a9a6e;
  }

  .qr-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .qr-label {
    font-family: sans-serif;
    font-size: 8.5px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8aab8e;
  }
</style>

    <div class="front-content">
      <div class="front-name">Mountain Ridge Restrooms</div>

  </div>

  <span class="card-label">Back</span>

    <div class="back-content">

      </div>

      <div class="qr-wrap">

        <div style="width: 110px; height: 110px; border: 2px dashed #8aab8e; border-radius: 4px; display: flex; align-items: center; justify-content: center; background-color: rgba(138, 171, 142, 0.05);">
          <span style="font-size: 11px; color: #8aab8e; text-align: center; padding: 8px;">QR Code</span>
        </div>

  </div>
